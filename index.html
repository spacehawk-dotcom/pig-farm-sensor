<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <meta name="google" content="notranslate">
    <title>성암농장 사육 현황 - 리포트 강화 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (호환 버전) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- SheetJS for XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif !important; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-animate { animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        input, select, textarea { font-size: 16px !important; outline: none; } 
        
        /* 돈방 그리드 설정 */
        .pen-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex: 1; }
        .pen-box { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: white; transition: all 0.2s; border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .pen-empty { background-color: #f1f5f9; color: #cbd5e1; border: 1px dashed #cbd5e1; } 
        .pen-wean { background-color: #10b981; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1); }  
        .pen-grow { background-color: #6366f1; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1); }  
        .pen-residual { background-color: #f59e0b; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1); }
        
        /* 배치 입구(문) 스타일 */
        .batch-gate-container { display: flex; align-items: stretch; margin-top: 10px; }
        .batch-gate-bar { width: 5px; border-radius: 3px; margin-right: 8px; opacity: 0.6; }
        .gate-wean { background-color: #10b981; }
        .gate-grow { background-color: #6366f1; }
        .gate-residual { background-color: #f59e0b; }
        .gate-empty { background-color: #cbd5e1; }

        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="date"] { color: inherit; font-family: inherit; border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px 8px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-24">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 px-5 py-4 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-black text-slate-800 tracking-tight">성암농장 사육 현황</h1>
                    <button onclick="window.openModal('shipment_history')" class="p-1.5 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 transition-colors active:scale-95">
                        <i data-lucide="file-spreadsheet" class="w-5 h-5"></i>
                    </button>
                </div>
                <p id="current-date" class="text-xs text-slate-500 font-semibold mt-0.5"></p>
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-xl shadow-md flex items-center">
                <span id="total-pigs-label" class="text-white text-[11px] font-bold tracking-wide whitespace-nowrap">로딩 중...</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        
        <!-- 상단 현황 그리드 영역 -->
        <section id="status-grid" class="grid grid-cols-5 gap-1.5"></section>

        <!-- 번식돈 관리 그리드 -->
        <section class="grid grid-cols-3 gap-2">
            <div onclick="window.openModal('sow_list', '재발')" class="bg-white p-3 rounded-2xl border border-red-200 shadow-sm cursor-pointer active:scale-95 transition-all flex flex-col items-center justify-center gap-1 relative overflow-hidden h-24">
                <span class="text-sm font-black text-red-600">재발</span>
                <p class="text-2xl font-black text-slate-800"><span id="return-sow-count">0</span><span class="text-xs font-bold text-slate-400 ml-0.5">두</span></p>
            </div>
            <div onclick="window.openModal('sow_list', '이유')" class="bg-white p-3 rounded-2xl border border-amber-200 shadow-sm cursor-pointer active:scale-95 transition-all flex flex-col items-center justify-center gap-1 relative overflow-hidden h-24">
                <span class="text-sm font-black text-amber-600">이유</span>
                <p class="text-2xl font-black text-slate-800"><span id="awaiting-sow-count">0</span><span class="text-xs font-bold text-slate-400 ml-0.5">두</span></p>
            </div>
            <div onclick="window.openModal('sow_list', '포유')" class="bg-white p-3 rounded-2xl border border-emerald-200 shadow-sm cursor-pointer active:scale-95 transition-all flex flex-col items-center justify-center gap-1 relative overflow-hidden h-24">
                <span class="text-sm font-black text-emerald-600">포유</span>
                <p class="text-2xl font-black text-slate-800"><span id="nursing-sow-count">0</span><span class="text-xs font-bold text-slate-400 ml-0.5">두</span></p>
            </div>
        </section>

        <!-- 예정 분만 -->
        <section>
            <div class="flex justify-between items-end mb-3 px-1">
                <h2 class="text-base font-black text-slate-800 flex items-center gap-2 w-full"><i data-lucide="calendar-heart" class="text-rose-500 w-5 h-5"></i> 주간 예상 분만 복수 <span class="text-[10px] text-rose-600 font-bold ml-1 bg-rose-50 px-1.5 py-0.5 rounded border border-rose-100 hidden sm:inline">터치 시 번호 확인</span>
                    <button onclick="window.exportExpectedFarrowingToExcel()" class="ml-auto text-[11px] font-black bg-rose-50 text-rose-700 px-2 py-1 rounded-lg border border-rose-100 flex items-center gap-1 active:scale-95 transition-all"><i data-lucide="download" class="w-3.5 h-3.5"></i> 엑셀</button>
                </h2>
            </div>
            <div id="expected-farrowing-list" class="flex overflow-x-auto gap-3 pb-2 no-scrollbar"></div>
        </section>

        <!-- 20일령(이유) 도래 복수 -->
        <section>
            <div class="flex justify-between items-end mb-3 px-1">
                <h2 class="text-base font-black text-slate-800 flex items-center gap-2"><i data-lucide="baby" class="text-emerald-500 w-5 h-5"></i> 20일령(이유) 도래 복수 <span class="text-[10px] text-emerald-600 font-bold ml-1 bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100">분만일+20일 기준 주차</span></h2>
            </div>
            <div id="weekly-nursing-list" class="flex overflow-x-auto gap-3 pb-2 no-scrollbar"></div>
        </section>

        <!-- 최근 출하기록 (과거 + 미래 예정) -->
        <section>
            <div class="flex justify-between items-end mb-3 px-1">
                <h2 class="text-base font-black text-slate-800 flex items-center gap-2 w-full"><i data-lucide="truck" class="text-blue-500 w-5 h-5"></i> 출하 기록 및 예정 <span class="text-[10px] text-blue-600 font-bold ml-1 bg-blue-50 px-1.5 py-0.5 rounded border border-blue-100 hidden sm:inline">터치 시 상세 확인</span>
                    <div class="ml-auto flex gap-1">
                        <button onclick="window.openModal('shipment_log_export')" class="text-[11px] font-black bg-blue-50 text-blue-700 px-2 py-1 rounded-lg border border-blue-100 flex items-center gap-1 active:scale-95 transition-all"><i data-lucide="download" class="w-3.5 h-3.5"></i> 출하기록</button>
                        <button onclick="window.openModal('expected_shipment_monthly')" class="text-[11px] font-black bg-purple-50 text-purple-700 px-2 py-1 rounded-lg border border-purple-100 flex items-center gap-1 active:scale-95 transition-all"><i data-lucide="trending-up" class="w-3.5 h-3.5"></i> 출하예측</button>
                    </div>
                </h2>
            </div>
            <div id="recent-shipment-list" class="flex overflow-x-auto gap-3 pb-2 no-scrollbar"></div>
        </section>

        <!-- 이유사 -->
        <section>
            <div class="flex justify-between items-end mb-3 px-1" id="weaning-header">
                <h2 class="text-base font-black text-slate-800 flex items-center gap-2"><div class="w-3 h-3 bg-emerald-500 rounded-sm"></div> 이유사 <span class="text-[10px] text-emerald-600 font-bold ml-1 bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100">칸 터치 시 기록/이동</span></h2>
            </div>
            <div id="weaning-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </section>

        <!-- 육성사 -->
        <section>
            <div class="flex justify-between items-end mb-3 px-1" id="grower-header">
                <h2 class="text-base font-black text-slate-800 flex items-center gap-2"><div class="w-3 h-3 bg-indigo-500 rounded-sm"></div> 육성사 및 후보사 <span class="text-[10px] text-indigo-600 font-bold ml-1 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">칸 터치 시 기록/이동</span></h2>
            </div>
            <div id="grower-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </section>

        <!-- 날짜별 변경사항 버튼 추가 -->
        <section class="pt-4 border-t border-slate-200 mt-8">
            <button onclick="window.openModal('daily_history')" class="w-full bg-white border border-slate-200 text-slate-600 font-bold py-4 rounded-2xl shadow-sm flex justify-center items-center gap-2 hover:bg-slate-50 active:scale-95 transition-all">
                <i data-lucide="history" class="w-5 h-5"></i> 날짜별 재고 변경사항 확인
            </button>
        </section>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2rem] sm:rounded-[2rem] p-6 shadow-2xl modal-animate flex flex-col max-h-[90vh]">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden shrink-0"></div>
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h3 id="modal-title" class="text-xl font-black text-slate-800 flex items-center gap-2"></h3>
                <button onclick="window.closeModal()" class="p-2 bg-slate-100 rounded-full text-slate-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="modal-content" class="space-y-4 overflow-y-auto no-scrollbar pb-4 flex-1 relative"></div>
            <div class="flex gap-3 mt-4 shrink-0 pt-4 border-t border-slate-100">
                <button id="cancel-btn" onclick="window.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">취소</button>
                <button id="save-btn" class="flex-[2] py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex justify-center items-center gap-2">
                    <i data-lucide="check" class="w-5 h-5"></i> 확인 및 저장
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800/95 backdrop-blur text-white text-sm font-bold rounded-full shadow-2xl opacity-0 transition-all z-[100] flex items-center gap-2 min-w-max pointer-events-none">
        <i data-lucide="info" class="w-4 h-4 text-emerald-400"></i> <span id="toast-msg">처리 완료</span>
    </div>

    <script>
        const apiKey = ""; 
        const firebaseConfig = {
            apiKey: "AIzaSyBlptGu2gTAQKVy_yDomKkNEd_el6c1PL0",
            authDomain: "sungamfarm.firebaseapp.com",
            projectId: "sungamfarm",
            storageBucket: "sungamfarm.firebasestorage.app",
            messagingSenderId: "811107235779",
            appId: "1:811107235779:web:ea65a74d09c37ba2136f76"
        };

        const WEANING_HEADER_DEFAULT = `<h2 class="text-base font-black text-slate-800 flex items-center gap-2"><div class="w-3 h-3 bg-emerald-500 rounded-sm"></div> 이유사 <span class="text-[10px] text-emerald-600 font-bold ml-1 bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100">칸 터치 시 기록/이동</span></h2>`;
        const GROWER_HEADER_DEFAULT = `<h2 class="text-base font-black text-slate-800 flex items-center gap-2"><div class="w-3 h-3 bg-indigo-500 rounded-sm"></div> 육성사 및 후보사 <span class="text-[10px] text-indigo-600 font-bold ml-1 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">칸 터치 시 기록/이동</span></h2>`;

        let app, auth, db, isLocalEnv = false;
        let appId = 'sungamfarm'; 
        
        const COLS = {
            STOCKS: `farms/${appId}/stocks`,
            WEANING: `farms/${appId}/weaning`,
            GROWER: `farms/${appId}/grower`,
            SOWS: `farms/${appId}/sows`,
            HISTORY: `farms/${appId}/history`,
            SHIPMENTS: `farms/${appId}/shipments`,
            SHIPMENT_SUMMARIES: `farms/${appId}/shipment_summaries`,
            ACCIDENTS: `farms/${appId}/accidents`
        };

        const KOR_STATUS_MAP = {
            '이유': '이유', 'reason': '이유', 'wean': '이유', 'weaning': '이유',
            '재발': '재발', 'relapse': '재발', 'recurrence': '재발', 'return': '재발',
            '대기': '대기', 'waiting': '대기', 'standby': '대기', 'atmosphere': '대기', 'awaiting': '대기',
            '포유': '포유', 'mammal': '포유', 'suckling': '포유', 'lactation': '포유', 'nursing': '포유',
            '임신': '임신', 'pregnancy': '임신', 'pregnant': '임신'
        };

        try {
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch(e) { console.error("Firebase Error:", e); isLocalEnv = true; }

        let state = {
            stocks: { boar: 5, piglet: 0, grower: 0, sow: 0, replacement: 0 },
            wBatches: Array.from({length: 5}, (_, i) => getEmptyBatch(i+1)),
            gBatches: Array.from({length: 8}, (_, i) => getEmptyBatch(i+1, true)),
            sowList: [], shipments: [], shipmentSummaries: {}, accidents: [], historyList: [],
            transfer: { active: false, src: null }
        };

        function getEmptyBatch(id, isGrower = false) {
            let pensCount = (isGrower && id === 8) ? 7 : 10;
            let b = { 
                id, status: 'empty', date: '', pens: 0, pigs: 0, memo: '', 
                penDetails: Array(pensCount).fill(0), 
                penDates: Array(pensCount).fill(''),
                penIsResidual: Array(pensCount).fill(false),
                penIsSick: Array(pensCount).fill(false)
            };
            if (isGrower) { b.sourceId = null; b.weaningDate = ''; b.pendingShipments = []; }
            return b;
        }

        const utils = {
            getTodayStr: () => { const d = new Date(); return new Date(d - d.getTimezoneOffset() * 60000).toISOString().split('T')[0]; },
            getTomorrowStr: () => { const d = new Date(); d.setDate(d.getDate() + 1); return new Date(d - d.getTimezoneOffset() * 60000).toISOString().split('T')[0]; },
            getDiffDays: (d1, d2) => { if(!d1||!d2) return 0; const t1=new Date(d1).getTime(), t2=new Date(d2).getTime(); if(isNaN(t1)||isNaN(t2)) return 0; return Math.floor((t2-t1)/(1000*60*60*24)); },
            parseDate: (ds) => {
                if (!ds) return null;
                let str = String(ds).trim();
                
                const nums = str.match(/\d+/g);
                if (!nums) return null;

                let y, m, d_val;
                if (nums.length >= 3) {
                    y = parseInt(nums[0], 10);
                    if (y < 100) y += 2000; 
                    m = parseInt(nums[1], 10) - 1; 
                    d_val = parseInt(nums[2], 10);
                } else if (nums.length === 2) {
                    y = new Date().getFullYear();
                    m = parseInt(nums[0], 10) - 1;
                    d_val = parseInt(nums[1], 10);
                } else {
                    let fallback = new Date(str);
                    return isNaN(fallback.getTime()) ? null : fallback;
                }
                let dateObj = new Date(y, m, d_val);
                return isNaN(dateObj.getTime()) ? null : dateObj;
            },
            getExpectedFarrow: (m) => { 
                const d = utils.parseDate(m);
                if (!d) return null;
                d.setDate(d.getDate()+115); 
                const yy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yy}-${mm}-${dd}`;
            },
            getWeekKey: (ds) => { 
                const d = utils.parseDate(ds);
                if (!d) return null;
                const day = d.getDay(); 
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                d.setDate(diff);
                const yy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yy}-${mm}-${dd}`;
            },
            getWeekOfMonth: (ds) => {
                if(!ds) return '';
                if(ds === 'Unknown') return '날짜 미상';
                const parts = ds.split('-');
                if(parts.length !== 3) return ds;
                const m = parseInt(parts[1], 10);
                const d = parseInt(parts[2], 10);
                if (isNaN(m) || isNaN(d)) return '오류(날짜확인)'; 
                
                const firstDayOfMonth = new Date(parts[0], m - 1, 1);
                let firstDayOfWeek = firstDayOfMonth.getDay();
                if (firstDayOfWeek === 0) firstDayOfWeek = 7; 
                const weekNumber = Math.ceil((d + firstDayOfWeek - 1) / 7);
                return `${m}월 ${weekNumber}주차 <span class="text-[10px] font-bold text-slate-400 tracking-tighter">(${m}/${d}~)</span>`;
            },
            normalizeBatch: (b, collectionName) => { 
                let pensCount = (collectionName.includes('grower') && b.id === 8) ? 7 : 10;
                if(!b.penDetails || b.penDetails.length !== pensCount) {
                    let oldDetails = b.penDetails || [];
                    b.penDetails = Array(pensCount).fill(0).map((v, i) => oldDetails[i] || 0);
                    b.penDates = Array(pensCount).fill('').map((v, i) => (b.penDates && b.penDates[i]) || '');
                    b.penIsResidual = Array(pensCount).fill(false).map((v, i) => (b.penIsResidual && b.penIsResidual[i]) || false);
                    b.penIsSick = Array(pensCount).fill(false).map((v, i) => (b.penIsSick && b.penIsSick[i]) || false);
                }
                if(!b.penIsResidual) b.penIsResidual = Array(pensCount).fill(false);
                if(!b.penIsSick) b.penIsSick = Array(pensCount).fill(false);
                if(b.pendingShipments===undefined) b.pendingShipments=[]; 
                if(b.weaningDate===undefined) b.weaningDate=''; 
                return b; 
            },
            showToast: (msg, dur=3000) => { const t=document.getElementById('toast'), tm=document.getElementById('toast-msg'); if(t&&tm){ tm.innerText=msg; t.classList.remove('opacity-0','pointer-events-none'); t.classList.add('opacity-100'); setTimeout(()=>{ t.classList.remove('opacity-100'); t.classList.add('opacity-0','pointer-events-none'); }, dur); } }
        };

        // 인증 및 초기화 로직
        async function init() {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
            lucide.createIcons();
            
            if (isLocalEnv) { 
                renderAll(); 
                return; 
            }
            
            try {
                auth.onAuthStateChanged(async user => { 
                    if (user) { 
                        try {
                            await initializeDataIfNeeded(); 
                            setupDataSync(); 
                        } catch (e) {
                            console.error("Firestore init error:", e);
                            isLocalEnv = true;
                            renderAll();
                            utils.showToast("DB 접근 권한이 거부되었습니다. Firebase 보안 규칙을 확인하세요.", 5000);
                        }
                    } else {
                        try {
                            await auth.signInAnonymously();
                        } catch(e) {
                            console.error("Auth error:", e);
                            isLocalEnv = true;
                            renderAll();
                            utils.showToast("인증이 실패했습니다. Firebase 콘솔에서 익명 로그인을 활성화해주세요.", 5000);
                        }
                    }
                });
            } catch (err) { 
                console.error("Firebase Setup Error:", err); 
                isLocalEnv = true; 
                renderAll(); 
            }
        }

        async function initializeDataIfNeeded() {
            const stockSnap = await db.doc(`${COLS.STOCKS}/current`).get();
            if (!stockSnap.exists) await db.doc(`${COLS.STOCKS}/current`).set(state.stocks);
            for (let i = 1; i <= 5; i++) { const s = await db.doc(`${COLS.WEANING}/batch_${i}`).get(); if (!s.exists) await db.doc(`${COLS.WEANING}/batch_${i}`).set(state.wBatches[i-1]); }
            for (let i = 1; i <= 8; i++) { const s = await db.doc(`${COLS.GROWER}/batch_${i}`).get(); if (!s.exists) await db.doc(`${COLS.GROWER}/batch_${i}`).set(state.gBatches[i-1]); }

        function setupDataSync() {
            const errLog = e => {
                console.error("Sync Error:", e);
                if (e.code === 'permission-denied') {
                    if (!isLocalEnv) utils.showToast("Firebase 보안 규칙(Rules) 때문에 동기화가 중단되었습니다.");
                    isLocalEnv = true;
                }
            };
            db.doc(`${COLS.STOCKS}/current`).onSnapshot(s => { if(s.exists) { state.stocks = s.data(); renderStocks(); } }, errLog);
            db.collection(COLS.WEANING).onSnapshot(s => { state.wBatches = s.docs.map(d => utils.normalizeBatch(d.data(), 'weaning')).sort((a,b)=>String(a.id||'').localeCompare(String(b.id||''))); renderWeaning(); renderStocks(); }, errLog);
            db.collection(COLS.GROWER).onSnapshot(s => { state.gBatches = s.docs.map(d => ({ ...utils.normalizeBatch(d.data(), 'grower') })).sort((a,b)=>String(a.id||'').localeCompare(String(b.id||''))); checkScheduledShipments(); renderGrower(); renderRecentShipments(); renderStocks(); }, errLog);
            db.collection(COLS.SOWS).onSnapshot(s => { 
                state.sowList = s.docs.map(d => {
                    const data = d.data();
                    let st = data.currentStatus || '이유';
                    data.currentStatus = KOR_STATUS_MAP[String(st).toLowerCase().trim()] || st;
                    data.parity = Number(data.parity) || 0;
                    return { dbId: d.id, ...data };
                }).sort((a,b) => String(a.sowNo||'').localeCompare(String(b.sowNo||''))); 
                renderExpectedFarrowing(); renderWeeklyNursing(); renderAlertSows(); renderStocks(); 
            }, errLog);
            db.collection(COLS.SHIPMENTS).onSnapshot(s => { state.shipments = s.docs.map(d => ({ dbId: d.id, ...d.data() })).sort((a,b) => String(b.date||'').localeCompare(String(a.date||''))); renderRecentShipments(); }, errLog);
            db.collection(COLS.SHIPMENT_SUMMARIES).onSnapshot(s => { 
                const summaries = {}; 
                s.docs.forEach(d => summaries[d.id] = d.data()); 
                state.shipmentSummaries = summaries; 
            }, errLog);
            db.collection(COLS.ACCIDENTS).onSnapshot(s => { state.accidents = s.docs.map(d => ({ dbId: d.id, ...d.data() })).sort((a,b) => String(b.date||'').localeCompare(String(a.date||''))); }, errLog);
            db.collection(COLS.HISTORY).onSnapshot(s => { state.historyList = s.docs.map(d => ({ date: d.id, ...d.data() })).sort((a,b) => String(b.date||'').localeCompare(String(a.date||''))); }, errLog);
        }

        async function saveDailyHistory() {
            if (isLocalEnv) return;
            try {
                state.stocks.piglet = state.wBatches.reduce((s, b) => s + (b.pigs || 0), 0);
                state.stocks.grower = state.gBatches.reduce((s, b) => s + (b.pigs || 0), 0);
                state.stocks.sow = state.sowList.filter(s => s.parity >= 1).length;
                state.stocks.sow_pregnant = state.sowList.filter(s => s.parity >= 1 && s.currentStatus === '임신').length;
                state.stocks.sow_nursing = state.sowList.filter(s => s.parity >= 1 && s.currentStatus === '포유').length;
                state.stocks.sow_weaning = state.sowList.filter(s => s.parity >= 1 && (s.currentStatus === '이유' || !s.currentStatus)).length;
                state.stocks.sow_return = state.sowList.filter(s => s.parity >= 1 && s.currentStatus === '재발').length;
                state.stocks.replacement = state.sowList.filter(s => s.parity === 0).length;
                await db.doc(`${COLS.HISTORY}/${utils.getTodayStr()}`).set({ stocks: state.stocks, updatedAt: new Date().toISOString() });
                await db.doc(`${COLS.STOCKS}/current`).update(state.stocks);
            } catch(e) { console.error("History Save Error:", e); }
        }

        function renderWeeklyNursing() {
            const map = {};

                        const sortedHistory = [...s.history].sort((a,b) => b.parity - a.parity);
                        farrowDate = sortedHistory[0].date;
                    }
                    if (farrowDate) {
                        const parsedDate = utils.parseDate(farrowDate);
                        if (parsedDate) {
                            parsedDate.setDate(parsedDate.getDate() + 20);

                            const wk = utils.getWeekKey(dateStr);
                            if (wk) {
                                if (!map[wk]) map[wk] = [];
                                map[wk].push(s);
                            } else {
                                if (!map['Unknown']) map['Unknown'] = [];
                                map['Unknown'].push(s);
                            }
                        } else {
                            if (!map['Unknown']) map['Unknown'] = [];
                            map['Unknown'].push(s);
                        }
                    } else {
                        if (!map['Unknown']) map['Unknown'] = [];
                        map['Unknown'].push(s);
                    }
                }
            });
            const html = Object.keys(map).sort().map(w => {

                }
                return `<div onclick="window.openModal('nursing_week', '${w}')" class="w-[110px] bg-white p-4 rounded-2xl border border-emerald-100 shadow-sm cursor-pointer active:scale-95 flex flex-col justify-between relative overflow-hidden shrink-0 transition-transform"><div class="absolute top-0 left-0 w-1.5 h-full bg-emerald-400"></div><p class="text-[13px] font-black text-slate-500 mb-2 pl-1 leading-tight">${utils.getWeekOfMonth(w)}</p><div class="flex items-end justify-between pl-1"><p class="text-3xl font-black text-emerald-600">${map[w].length}<span class="text-sm font-bold text-emerald-400 ml-1">복</span></p><i data-lucide="chevron-right" class="w-4 h-4 text-emerald-200 mb-1"></i></div></div>`;
            }).join('');

            lucide.createIcons();
        }

        function renderRecentShipments() {
            const dateGroups = {}; 
            state.shipments.forEach(s => {
                if (!dateGroups[s.date]) { dateGroups[s.date] = { date: s.date, total: 0, status: 'confirmed' }; }
                dateGroups[s.date].total += (s.count || 0);
            });
            state.gBatches.forEach(b => {

                    b.pendingShipments.forEach(ps => {

            const html = sortedList.slice(0, 10).map(s => {

            lucide.createIcons();
        }

        async function checkScheduledShipments() {
            if (isLocalEnv) return;
            const todayStr = utils.getTodayStr();
            const promises = state.gBatches.map(async b => {
                if (b.pendingShipments && b.pendingShipments.length > 0) {
                    let needsUpdate = false, newPending = [], newDetails = [...b.penDetails], newDates = [...b.penDates];
                    b.pendingShipments.forEach(ps => {
                        if (ps.date <= todayStr) {
                            ps.items.forEach(i => { 
                                const penDate = (b.penDates && b.penDates[i.pIdx]) || b.weaningDate || b.date;
                                if(newDetails[i.pIdx]>=i.count) newDetails[i.pIdx]-=i.count; else newDetails[i.pIdx]=0; 
                                if(newDetails[i.pIdx]===0) newDates[i.pIdx]=''; 
                                db.collection(COLS.SHIPMENTS).add({ 
                                    date: ps.date, batchId: b.id, penIndex: i.pIdx, count: i.count, stockingDate: penDate || '', timestamp: new Date().toISOString() 
                                });
                            });
                            needsUpdate = true;
                        } else newPending.push(ps);
                    });
                    if (needsUpdate) {
                        const nP = newDetails.reduce((a,c)=>a+c,0), nPens = newDetails.filter(v=>v>0).length;
                        await db.doc(`${COLS.GROWER}/batch_${b.id}`).update({ penDetails: newDetails, penDates: newDates, pigs: nP, pens: nPens, status: nP>0?'active':'empty', pendingShipments: newPending });
                    }
                }
            });
            await Promise.all(promises);
        }

                const title = isRes ? '후보사' : `${type} ${b.id}배치`, actualCls = isRes ? 'pen-residual' : typeCls;
                const gateCls = isEmpty ? 'gate-empty' : (isRes ? 'gate-residual' : (stage === 'weaning' ? 'gate-wean' : 'gate-grow'));
                
                let pensHtml = '';
                for(let i=0; i < b.penDetails.length; i++) {
                    const c = b.penDetails[i] || 0, isFill = c > 0;
                    let txt = isFill ? `<div>${c}</div>` : '';
                    if (isFill && (b.penDates[i] || b.weaningDate || b.date)) {
                        const ageVal = utils.getDiffDays(b.penDates[i] || b.weaningDate || b.date, utils.getTodayStr()) + 20;
                        const isSick = b.penIsSick && b.penIsSick[i];
                        let displayStr = `${ageVal}일령`;

                            const isResidual = b.penIsResidual && b.penIsResidual[i];

                return `

                            </div>
                            <span class="text-[14px] font-black ${txtCls} shrink-0">${b.pigs}두</span>
                        </div>
                    </div>
                    <div>
                        <div class="batch-gate-container">
                            <div class="batch-gate-bar ${gateCls}"></div>
                            <div class="pen-grid">${pensHtml}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

                const filteredShipments = state.shipments.filter(r => r.date >= start && r.date <= end);

                if (filteredShipments.length === 0) {
                    utils.showToast("해당 기간에 출하 기록이 없습니다.");
                    return;
                }

                const dateGroups = {};
                filteredShipments.forEach(r => {
                    if (!dateGroups[r.date]) dateGroups[r.date] = { date: r.date, totalCount: 0, totalAgeSum: 0, validRecordsCount: 0 };
                    
                    dateGroups[r.date].totalCount += (r.count || 0);

                    let rDate = r.stockingDate || '';
                    if(!rDate && r.batchId) {
                        const b = state.gBatches.find(x => x.id === r.batchId);
                        if(b) rDate = (b.penDates && b.penDates[r.penIndex]) || b.weaningDate || b.date;
                    }
                    if (rDate) {
                        const age = utils.getDiffDays(rDate, r.date) + 20;
                        dateGroups[r.date].totalAgeSum += age * (r.count || 0);
                        dateGroups[r.date].validRecordsCount += (r.count || 0);
                    }
                });

                const excelData = Object.values(dateGroups).sort((a,b) => String(b.date).localeCompare(String(a.date))).map(g => {

                        '평균 일령': avgAge,

                const cStockDate = currentPenDate || (b.penDates && b.penDates[pIdx]) || b.weaningDate || b.date;
                
                if (accCount > 0) {
                    if (accCount > cnt) throw new Error("입력된 폐사/도태 두수가 현재 두수보다 많습니다.");

                        });

            }
        };

        window.startTransfer = (stg, bId, pIdx) => { window.closeModal(); state.transfer = { active: true, src: { stage: stg, batchId: bId, penIndex: pIdx } }; const msg = `<h2 class="text-base font-black text-rose-600 animate-pulse">도착할 칸을 터치하세요!</h2>`; document.getElementById('weaning-header').innerHTML = msg; document.getElementById('grower-header').innerHTML = msg; renderGrower(); renderWeaning(); }
        
        window.quickSaveBatchMemo = async (stg, bId, memoVal) => {
            try {
                await db.doc(`${stg==='weaning'?COLS.WEANING:COLS.GROWER}/batch_${bId}`).update({ memo: memoVal });
                utils.showToast("메모가 저장되었습니다.", 1500);
            } catch(e) {
                utils.showToast("메모 저장 실패: " + e.message);
            }
        };

        async function processSave(type) { 
            const btn = document.getElementById('save-btn'); 
            btn.disabled = true; 
            btn.innerText = '저장 중...'; 
            try { 
                await saveActions[type](); 
                window.closeModal(); 
                if (!isLocalEnv) saveDailyHistory(); 
                if (isLocalEnv) renderAll(); // 로컬 환경일 경우 수동으로 UI 업데이트
            } catch (e) { 
                console.error(e);
                if (e.code === 'permission-denied' || (e.message && e.message.includes('permission'))) {
                    utils.showToast("저장 실패: 파이어베이스 Security Rules 권한이 없습니다.");
                } else {
                    utils.showToast("처리 실패: " + e.message); 
                }
            } finally { 
                btn.disabled = false; 
                btn.innerText = '확인 및 저장'; 
            } 
        }
        window.onload = init;
    </script>
</body>
</html>
