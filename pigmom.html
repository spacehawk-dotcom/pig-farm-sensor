<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>성암농장 모돈 관리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 JSX 문법 실시간 해석) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS (엑셀 다운로드 라이브러리 추가) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Firebase SDK (호환 버전: 단일 HTML 환경용) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
    /* 슬라이드 애니메이션 */
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    /* input number 스피너 숨기기 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

  <!-- React 앱이 렌더링될 공간 -->
  <div id="root"></div>

  <!-- 여기서부터 React 코드를 브라우저가 실시간으로 해석합니다 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 내장 SVG 아이콘 컴포넌트 ---
    const Search = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const ArrowLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
    const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Activity = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
    const Baby = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 11.5h.01"/><path d="M16 11.5h.01"/><path d="M9 15.5a4 4 0 0 0 6 0"/></svg>;
    const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
    const ChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const X = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

    // --- 성암농장 실제 Firebase Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyBlptGu2gTAQKVy_yDomKkNEd_el6c1PL0",
      authDomain: "sungamfarm.firebaseapp.com",
      projectId: "sungamfarm",
      storageBucket: "sungamfarm.firebasestorage.app",
      messagingSenderId: "811107235779",
      appId: "1:811107235779:web:ea65a74d09c37ba2136f76"
    };

    // Firebase 초기화
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const SOWS_COLLECTION_PATH = 'farms/sungamfarm/sows';
    const WEANING_RECORDS_PATH = 'farms/sungamfarm/weaning_records'; 
    const SETTINGS_PATH = 'farms/sungamfarm/settings'; 

    function App() {
      const [user, setUser] = useState(null);
      const [sows, setSows] = useState([]);
      const [weaningRecords, setWeaningRecords] = useState({}); 
      const [farmSettings, setFarmSettings] = useState({ avgSowCount: 0 }); 
      const [loading, setLoading] = useState(true);
      
      // UI 상태 관리
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedSowId, setSelectedSowId] = useState(null);
      const [showAddSow, setShowAddSow] = useState(false);
      const [showAddRecord, setShowAddRecord] = useState(false);
      const [showSowListModal, setShowSowListModal] = useState(false);
      const [listFilter, setListFilter] = useState(null);
      
      // 직접 기록용 주간 이유 팝업 상태
      const [showWeaningModal, setShowWeaningModal] = useState(false);
      const [isEditingWeaning, setIsEditingWeaning] = useState(false);
      const [confirmWeaningDelete, setConfirmWeaningDelete] = useState(false); 
      const [weaningForm, setWeaningForm] = useState({ date: '', sowCount: '', totalWeaned: '' });
      const [showFormulaModal, setShowFormulaModal] = useState(false); // PSY/MSY 계산식 팝업

      // 폼 상태
      const [newSow, setNewSow] = useState({ sowNo: '', parity: 0, currentStatus: '이유' });
      const [newRecord, setNewRecord] = useState({ parity: '', date: '', expDate: '', born: '', weaned: '', move: '' });

      // --- Auth & Data Fetching ---
      useEffect(() => {
        auth.signInAnonymously().catch(err => console.error("Auth error:", err));
        
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (!currentUser) setLoading(false);
        });
        
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user) return;

        // 1. 모돈 정보 가져오기 (null 방어 완벽 적용)
        const unsubSows = db.collection(SOWS_COLLECTION_PATH).onSnapshot(
          (snapshot) => {
            const sowsData = snapshot.docs
              .map(doc => {
                const data = doc.data();
                return data ? { id: doc.id, ...data } : null;
              })
              .filter(sow => sow && (sow || {}).sowNo); 
            
            sowsData.sort((a, b) => String((a || {}).sowNo || '').localeCompare(String((b || {}).sowNo || '')));
            setSows(sowsData);
            setLoading(false);
          },
          (error) => {
            console.error("Error fetching sows:", error);
            setLoading(false);
          }
        );

        // 2. 직접 기록한 주간 이유 기록 정보 가져오기
        const unsubWeaning = db.collection(WEANING_RECORDS_PATH).onSnapshot(
          (snapshot) => {
            const records = {};
            snapshot.docs.forEach(doc => { 
              if(doc.data()) records[doc.id] = doc.data(); 
            });
            setWeaningRecords(records);
          },
          (error) => console.error("Error fetching weaning records:", error)
        );

        // 3. 농장 설정(평균 상시 모돈수) 가져오기
        const unsubSettings = db.collection(SETTINGS_PATH).doc('main').onSnapshot(
          (doc) => {
            if (doc.exists && doc.data()) {
              setFarmSettings(doc.data());
            }
          },
          (error) => console.error("Error fetching settings:", error)
        );

        return () => { unsubSows(); unsubWeaning(); unsubSettings(); };
      }, [user]);

      // 헬퍼: 분만 예정일 계산 (+115일)
      const getExpectedFarrow = (matingDate) => {
        if (!matingDate) return '';
        const parts = String(matingDate).split('-');
        if (parts.length !== 3) return '';
        
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1;
        const day = parseInt(parts[2], 10);
        
        const d = new Date(year, month, day);
        d.setDate(d.getDate() + 115);
        
        const yy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        
        return `${yy}-${mm}-${dd}`;
      };

      // 헬퍼: 분만일 기준 이유하는 목요일 계산
      const getWeaningThursday = (farrowDateStr) => {
        if (!farrowDateStr) return null;
        const parts = String(farrowDateStr).split('-');
        if (parts.length !== 3) return null;
        
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1;
        const day = parseInt(parts[2], 10);
        
        const d = new Date(year, month, day);
        
        const currentDay = d.getDay(); 
        const diffToMonday = currentDay === 0 ? -6 : 1 - currentDay; 
        
        d.setDate(d.getDate() + diffToMonday + 24);
        
        const yy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        
        return `${yy}-${mm}-${dd}`;
      };

      // --- Data Processing ---
      const filteredSows = useMemo(() => {
        let result = sows.filter(Boolean);

        if (listFilter) {
          const filterObj = listFilter || {};
          if (filterObj.type === 'status') {
            result = result.filter(sow => sow && ((sow || {}).currentStatus || '이유') === filterObj.value);
          } else if (filterObj.type === 'parity') {
            result = result.filter(sow => sow && (Number((sow || {}).parity) || 0) === Number(filterObj.value));
          } else if (filterObj.type === 'expectedMonth') {
            result = result.filter(sow => {
              const s = sow || {};
              if (!s.matingDate || s.currentStatus === '포유' || s.currentStatus === '재발') return false;
              const expDateStr = getExpectedFarrow(s.matingDate);
              return expDateStr && expDateStr.substring(0, 7) === filterObj.value;
            });
          }
        }

        if (searchQuery) {
          result = result.filter(sow => 
            sow && String((sow || {}).sowNo || '').toLowerCase().includes(String(searchQuery).toLowerCase())
          );
        }

        return result;
      }, [sows, searchQuery, listFilter]);

      const currentSow = useMemo(() => {
        return sows.find(s => s && (s || {}).id === selectedSowId) || null;
      }, [sows, selectedSowId]);

      // 대시보드 통계 계산
      const dashboardStats = useMemo(() => {
        const stats = {
          total: sows.filter(Boolean).length,
          status: { '이유': 0, '임신': 0, '포유': 0, '재발': 0 },
          parity: {},
          monthlyFarrowing: {}
        };
        
        const oneYearAgo = new Date();
        oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
        const yy = oneYearAgo.getFullYear();
        const mm = String(oneYearAgo.getMonth() + 1).padStart(2, '0');
        const dd = String(oneYearAgo.getDate()).padStart(2, '0');
        const oneYearAgoStr = `${yy}-${mm}-${dd}`;
        
        sows.filter(Boolean).forEach(sow => {
          const s = sow || {};
          const status = s.currentStatus || '이유';
          if (stats.status[status] !== undefined) stats.status[status]++;
          
          const p = Number(s.parity) || 0;
          if (stats.parity[p] !== undefined) stats.parity[p]++;
          else stats.parity[p] = 1;

          if (s.matingDate && s.currentStatus !== '포유' && s.currentStatus !== '재발') {
            const expDateStr = getExpectedFarrow(s.matingDate);
            if (expDateStr) {
              const ym = expDateStr.substring(0, 7);
              stats.monthlyFarrowing[ym] = (stats.monthlyFarrowing[ym] || 0) + 1;
            }
          }
        });

        let manualYearlyWeaned = 0;
        Object.entries(weaningRecords).forEach(([date, data]) => {
          if (date >= oneYearAgoStr && data) {
            manualYearlyWeaned += Number((data || {}).totalWeaned || 0);
          }
        });

        const fSettings = farmSettings || {};
        const avgSows = fSettings.avgSowCount > 0 ? fSettings.avgSowCount : stats.total;

        stats.psy = avgSows > 0 ? (manualYearlyWeaned / avgSows).toFixed(1) : "0.0";
        stats.msy = avgSows > 0 ? (parseFloat(stats.psy) * 0.95).toFixed(1) : "0.0";
        stats.avgSows = avgSows;
        stats.manualYearlyWeaned = manualYearlyWeaned;

        return stats;
      }, [sows, weaningRecords, farmSettings]);

      // 모돈별 통계
      const sowStats = useMemo(() => {
        const s = currentSow || {};
        if (!s.history || !Array.isArray(s.history)) {
          return { totalLitters: 0, avgBorn: 0, avgWeaned: 0 };
        }
        
        const history = s.history.filter(Boolean);
        const totalLitters = history.length;
        const totalBorn = history.reduce((sum, r) => sum + Number((r || {}).born || 0), 0);
        const totalWeaned = history.reduce((sum, r) => sum + Number((r || {}).weaned || 0), 0);
        
        return {
          totalLitters,
          avgBorn: totalLitters > 0 ? (totalBorn / totalLitters).toFixed(1) : "0.0",
          avgWeaned: totalLitters > 0 ? (totalWeaned / totalLitters).toFixed(1) : "0.0"
        };
      }, [currentSow]);

      // 매주 목요일 기준 주간 이유 자동 계산
      const weaningStats = useMemo(() => {
        const statsMap = {};
        
        sows.filter(Boolean).forEach(sow => {
          const s = sow || {};
          if (!s.history || !Array.isArray(s.history)) return;
          
          s.history.filter(Boolean).forEach(record => {
            const r = record || {};
            if (!r.date) return; 
            
            const wCount = Number(r.weaned) || 0;
            const mCount = Number(r.move) || 0;
            const totalWeaned = wCount + mCount;

            const weaningThursday = getWeaningThursday(r.date);
            if (!weaningThursday) return;

            if (!statsMap[weaningThursday]) {
              statsMap[weaningThursday] = { date: weaningThursday, sows: [], totalWeanedAuto: 0 };
            }
            if (!statsMap[weaningThursday].sows.find(item => item && (item || {}).id === s.id)) {
               statsMap[weaningThursday].sows.push(s);
            }
            statsMap[weaningThursday].totalWeanedAuto += totalWeaned;
          });
        });

        return Object.values(statsMap).sort((a, b) => String((b || {}).date || '').localeCompare(String((a || {}).date || '')));
      }, [sows]);

      const currentWeaningStat = useMemo(() => {
        return weaningStats.find(s => s && (s || {}).date === (weaningForm || {}).date) || null;
      }, [weaningStats, weaningForm]);

      // 수동으로 입력한 주간 이유 성적 배열
      const sortedWeaningRecords = useMemo(() => {
        return Object.entries(weaningRecords)
          .filter(([date, data]) => Boolean(data))
          .map(([date, data]) => ({ date, ...data }))
          .sort((a, b) => String((b || {}).date || '').localeCompare(String((a || {}).date || '')));
      }, [weaningRecords]);


      // --- Handlers ---
      const handleSaveAvgSowCount = (val) => {
        const numberVal = Number(val);
        db.collection(SETTINGS_PATH).doc('main').set({ avgSowCount: numberVal }, { merge: true });
      };

      const handleAddSow = async (e) => {
        e.preventDefault();
        const ns = newSow || {};
        if (!user || !ns.sowNo) return;
        try {
          await db.collection(SOWS_COLLECTION_PATH).add({
            sowNo: ns.sowNo || '',
            parity: Number(ns.parity) || 0,
            currentStatus: ns.currentStatus || '이유',
            matingDate: '',
            history: []
          });
          setNewSow({ sowNo: '', parity: 0, currentStatus: '이유' });
          setShowAddSow(false);
        } catch (err) {
          console.error("Error adding sow:", err);
        }
      };

      const handleDeleteSow = async (id) => {
        if (!user || !window.confirm("정말로 이 모돈과 모든 기록을 삭제하시겠습니까?")) return;
        try {
          await db.collection(SOWS_COLLECTION_PATH).doc(id).delete();
          if (selectedSowId === id) setSelectedSowId(null);
        } catch (err) {
          console.error("Error deleting sow:", err);
        }
      };

      const handleUpdateStatus = async (field, value) => {
        const s = currentSow || {};
        if (!user || !s.id) return;
        try {
          await db.collection(SOWS_COLLECTION_PATH).doc(s.id).update({
            [field]: value
          });
        } catch (err) {
          console.error(`Error updating ${field}:`, err);
        }
      };

      const handleAddRecord = async (e) => {
        e.preventDefault();
        const s = currentSow || {};
        const nr = newRecord || {};
        if (!user || !s.id) return;
        try {
          const newHistoryItem = {
            parity: Number(nr.parity) || 0,
            date: nr.date || '',
            expDate: nr.expDate || '',
            born: Number(nr.born) || 0,
            weaned: Number(nr.weaned) || 0,
            move: Number(nr.move) || 0
          };
          
          const updatedHistory = [...(s.history || []).filter(Boolean), newHistoryItem]
            .sort((a, b) => (Number((b || {}).parity) || 0) - (Number((a || {}).parity) || 0));

          await db.collection(SOWS_COLLECTION_PATH).doc(s.id).update({
            history: updatedHistory,
            parity: Math.max(Number(s.parity) || 0, newHistoryItem.parity || 0)
          });
          
          setNewRecord({ parity: '', date: '', expDate: '', born: '', weaned: '', move: '' });
          setShowAddRecord(false);
        } catch (err) {
          console.error("Error adding record:", err);
        }
      };

      const handleDeleteRecord = async (indexToRemove) => {
        const s = currentSow || {};
        if (!user || !s.id || !window.confirm("이 기록을 삭제하시겠습니까?")) return;
        try {
          const updatedHistory = (s.history || []).filter(Boolean).filter((_, idx) => idx !== indexToRemove);
          await db.collection(SOWS_COLLECTION_PATH).doc(s.id).update({
            history: updatedHistory
          });
        } catch (err) {
          console.error("Error deleting record:", err);
        }
      };

      const openWeaningModal = (record = null) => {
        setConfirmWeaningDelete(false); 
        if (record) {
          const r = record || {};
          setWeaningForm({ date: r.date || '', sowCount: r.sowCount || '', totalWeaned: r.totalWeaned || '' });
          setIsEditingWeaning(true);
        } else {
          const today = new Date();
          const yy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, '0');
          const dd = String(today.getDate()).padStart(2, '0');
          setWeaningForm({ date: `${yy}-${mm}-${dd}`, sowCount: '', totalWeaned: '' });
          setIsEditingWeaning(false);
        }
        setShowWeaningModal(true);
      };

      const handleSaveWeaning = async (e) => {
        e.preventDefault();
        const wf = weaningForm || {};
        if (!user || !wf.date) return;
        try {
          await db.collection(WEANING_RECORDS_PATH).doc(wf.date).set({
            sowCount: Number(wf.sowCount) || 0,
            totalWeaned: Number(wf.totalWeaned) || 0,
            updatedAt: new Date().toISOString()
          });
          setShowWeaningModal(false);
          setWeaningForm({ date: '', sowCount: '', totalWeaned: '' });
        } catch (err) {
          console.error("Error saving weaning record:", err);
        }
      };

      const handleDeleteWeaning = async (e) => {
        if (e) e.preventDefault();
        const wf = weaningForm || {};
        if (!user || !wf.date) return;
        try {
          await db.collection(WEANING_RECORDS_PATH).doc(wf.date).delete();
          setShowWeaningModal(false);
          setConfirmWeaningDelete(false);
        } catch (err) {
          console.error("Error deleting weaning record:", err);
        }
      };

      const openFilteredList = (type, value) => {
        setListFilter({ type, value });
        setSearchQuery('');
        setShowSowListModal(true);
      };

      const openAllList = () => {
        setListFilter(null);
        setSearchQuery('');
        setShowSowListModal(true);
      };

      const getStatusColor = (status) => {
        switch(status) {
          case '포유': return 'text-emerald-600 bg-emerald-50 border-emerald-200';
          case '임신': return 'text-blue-600 bg-blue-50 border-blue-200';
          case '재발': return 'text-rose-600 bg-rose-50 border-rose-200';
          default: return 'text-slate-600 bg-slate-100 border-slate-200';
        }
      };

      // 엑셀 다운로드
      const downloadWeaningExcel = () => {

                      </div>
                    ) : (
                      sortedWeaningRecords.map(stat => {
                        const st = stat || {};
                        return (
                          <div 
                            key={st.date} 
                            onClick={() => openWeaningModal(st)}
                            className="min-w-[120px] bg-white border border-blue-200 rounded-xl p-3 flex flex-col justify-center relative shadow-sm snap-start shrink-0 cursor-pointer hover:border-blue-400 active:scale-95 transition-all"
                          >
                            <span className="text-[11px] font-black text-slate-500 mb-2">{(st.date || '').substring(5).replace('-', '/')} 이유</span>
                            <div className="flex flex-col gap-1.5">
                              <div className="flex justify-between items-center bg-slate-50 px-1.5 py-1 rounded">
                                <span className="text-[10px] font-bold text-slate-500">모돈</span>
                                <span className="text-[13px] font-black text-slate-800">{st.sowCount || 0}<span className="text-[9px] font-normal ml-0.5">복</span></span>
                              </div>
                              <div className="flex justify-between items-center bg-blue-100/50 px-1.5 py-1 rounded border border-blue-100">
                                <span className="text-[10px] font-bold text-blue-600">이유</span>
                                <span className="text-[14px] font-black text-blue-700">{st.totalWeaned || 0}<span className="text-[9px] font-normal ml-0.5">두</span></span>
                              </div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>

              </div>
            ) : (
              <div className="text-center py-20">
                <div className="bg-slate-200 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Baby className="w-8 h-8 text-slate-400" />
                </div>
                <h3 className="text-sm font-black text-slate-600 mb-1">데이터베이스가 비어 있습니다.</h3>
                <p className="text-xs text-slate-400">우측 하단의 + 버튼을 눌러 모돈을 등록하세요.</p>
              </div>
            )}
          </main>

          {/* --- 전체/필터 개체 리스트 팝업 (모달) --- */}
          {showSowListModal && (
            <div className="fixed inset-0 bg-slate-50 z-50 flex flex-col" style={{ animation: "slideUp 0.2s ease-out" }}>
              <header className="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 shadow-sm flex items-center gap-3">
                <button onClick={() => { setShowSowListModal(false); setListFilter(null); }} className="p-2 bg-slate-100 rounded-lg text-slate-500 hover:text-slate-800 transition">
                  <ArrowLeft className="w-5 h-5" />
                </button>
                <div className="relative flex-1">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Search className="w-4 h-4 text-slate-400" />
                  </div>
                  <input 
                    type="text" 
                    placeholder="개체 번호 검색..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full pl-9 pr-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:outline-none focus:border-blue-400"
                  />
                </div>
              </header>

              <div className="flex-1 overflow-y-auto p-4 max-w-3xl mx-auto w-full pb-24">
                <div className="flex justify-between items-end mb-3 px-1 border-b border-slate-200 pb-2">
                  <div className="flex flex-col">
                    <h3 className="text-sm font-black text-slate-800">
                      {searchQuery ? '검색 결과' : listFilter ? '분류된 개체 리스트' : '전체 개체 리스트'}
                    </h3>
                    {listFilter && (
                      <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md inline-flex items-center gap-1 mt-1 w-max border border-blue-100">
                        {(listFilter || {}).type === 'status' ? `${(listFilter || {}).value} 상태` : 
                         (listFilter || {}).type === 'parity' ? `${(listFilter || {}).value}산` :
                         `${String((listFilter || {}).value || '').split('-')[0]}년 ${parseInt(String((listFilter || {}).value || '').split('-')[1] || 0)}월 분만 예정`}
                        <button onClick={(e) => { e.stopPropagation(); setListFilter(null); }} className="hover:text-rose-500 transition-colors bg-blue-100 rounded-full p-0.5 ml-1">
                          <X className="w-3 h-3" />
                        </button>
                      </span>
                    )}
                  </div>
                  <span className="text-xs font-bold text-blue-600">{filteredSows.length}두</span>
                </div>

                {filteredSows.length === 0 ? (
                  <div className="text-center py-20">
                    <div className="bg-slate-200 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                      <Baby className="w-8 h-8 text-slate-400" />
                    </div>
                    <h3 className="text-sm font-black text-slate-600 mb-1">조건에 맞는 모돈이 없습니다.</h3>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                    {filteredSows.map(sow => {
                      const s = sow || {};
                      const statusClass = getStatusColor(s.currentStatus);
                      return (
                        <div 
                          key={s.id} 
                          onClick={() => {
                            setSelectedSowId(s.id);
                            setShowSowListModal(false);
                          }}
                          className="bg-white p-3 rounded-2xl border border-slate-100 hover:border-blue-300 shadow-sm cursor-pointer active:scale-95 transition-all flex flex-col items-center justify-center relative overflow-hidden"
                        >
                          <div className="flex flex-col items-center gap-0.5 mb-3 mt-2">
                            <span className="text-2xl font-black text-slate-800 leading-none tracking-tighter">{s.sowNo || '-'}</span>
                            <span className="text-xs font-bold text-slate-400 leading-none">{s.parity || 0}산</span>
                          </div>
                          <span className={"text-[13px] font-black w-full text-center py-1.5 rounded-xl border leading-none " + statusClass}>
                            {s.currentStatus || '이유'}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* --- 주간 이유 직접 기록 관리 팝업 --- */}
          {showWeaningModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center">
              <div className="bg-white rounded-t-[2rem] md:rounded-[2rem] w-full max-w-md p-6 shadow-2xl" style={{ animation: "slideUp 0.2s ease-out" }}>
                <div className="flex justify-between items-center mb-6">
                  <div className="flex flex-col">
                    <h3 className="text-lg font-black text-slate-800">이유 성적 기록</h3>
                    <span className="text-xs font-bold text-blue-600">{isEditingWeaning ? '기록 수정' : '새 기록 추가'}</span>
                  </div>
                  <button onClick={() => setShowWeaningModal(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800"><X className="w-5 h-5" /></button>
                </div>

                <div className="mb-4">
                  <h4 className="text-[11px] font-bold text-slate-500 mb-2">해당 주차 이유 예정 모돈 ({(currentWeaningStat || {}).sows?.length || 0}두) <span className="font-normal text-blue-500">터치 시 이동</span></h4>
                  <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto no-scrollbar pb-2">
                    {((currentWeaningStat || {}).sows || []).map(sow => {
                      const s = sow || {}; 
                      return (
                        <span 
                          key={s.id} 
                          onClick={() => {
                            setSelectedSowId(s.id);
                            setShowWeaningModal(false);
                          }}
                          className="bg-slate-100 text-slate-700 font-bold px-2.5 py-1.5 rounded-lg text-[13px] border border-slate-200 cursor-pointer hover:bg-blue-100 hover:text-blue-700 hover:border-blue-300 transition-all active:scale-95 shadow-sm"
                        >
                          {s.sowNo || '-'}
                        </span>
                      )
                    })}
                  </div>
                </div>

                <form onSubmit={handleSaveWeaning} className="space-y-4 border-t border-slate-100 pt-4">
                  <div>
                    <label className="text-[11px] font-bold text-slate-500 block mb-1">이유일 (날짜)</label>
                    <input 
                      type="date" 
                      required 
                      value={(weaningForm || {}).date || ''} 
                      onChange={e => setWeaningForm({...weaningForm, date: e.target.value})} 
                      disabled={isEditingWeaning}
                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-black outline-none focus:border-blue-400 disabled:opacity-50 disabled:cursor-not-allowed" 
                    />
                    {isEditingWeaning && <p className="text-[9px] text-slate-400 mt-1">수정 시 날짜는 변경할 수 없습니다. 삭제 후 다시 등록해주세요.</p>}
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[11px] font-bold text-blue-600 block mb-1">이유 모돈수 (복)</label>
                      <div className="flex items-center gap-2">
                        <input 
                          type="number" 
                          required
                          value={(weaningForm || {}).sowCount || ''} 
                          onChange={e => setWeaningForm({...weaningForm, sowCount: e.target.value})} 
                          className="flex-1 bg-blue-50 border border-blue-200 rounded-xl p-3 text-lg font-black text-blue-800 outline-none focus:border-blue-400" 
                          placeholder="0" 
                        />
                        <span className="text-sm font-bold text-slate-500">복</span>
                      </div>
                    </div>
                    
                    <div>
                      <label className="text-[11px] font-bold text-blue-600 block mb-1">이유두수 (두)</label>
                      <div className="flex items-center gap-2">
                        <input 
                          type="number" 
                          required
                          value={(weaningForm || {}).totalWeaned || ''} 
                          onChange={e => setWeaningForm({...weaningForm, totalWeaned: e.target.value})} 
                          className="flex-1 bg-blue-50 border border-blue-200 rounded-xl p-3 text-lg font-black text-blue-800 outline-none focus:border-blue-400" 
                          placeholder="0" 
                        />
                        <span className="text-sm font-bold text-slate-500">두</span>
                      </div>
                    </div>
                  </div>
                  
                  <button type="submit" className="w-full mt-4 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">저장하기</button>
                  
                  {isEditingWeaning && (
                    !confirmWeaningDelete ? (
                      <button type="button" onClick={() => setConfirmWeaningDelete(true)} className="w-full py-4 mt-2 bg-rose-50 text-rose-600 rounded-2xl font-black shadow-sm">
                        이 기록 삭제하기
                      </button>
                    ) : (
                      <div className="flex gap-2 mt-2">
                        <button type="button" onClick={() => setConfirmWeaningDelete(false)} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black shadow-sm">
                          삭제 취소
                        </button>
                        <button type="button" onClick={handleDeleteWeaning} className="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black shadow-sm">
                          확인 (영구삭제)
                        </button>
                      </div>
                    )
                  )}
                </form>
              </div>
            </div>
          )}

          {/* --- PSY / MSY 계산식 팝업 --- */}
          {showFormulaModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[80] flex items-end md:items-center justify-center">
              <div className="bg-white rounded-t-[2rem] md:rounded-[2rem] w-full max-w-sm p-6 shadow-2xl" style={{ animation: "slideUp 0.2s ease-out" }}>
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-800">PSY / MSY 계산식</h3>
                  <button onClick={() => setShowFormulaModal(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition-colors"><X className="w-5 h-5" /></button>
                </div>
                
                <div className="space-y-4">
                  <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <h4 className="text-xs font-black text-indigo-600 mb-2">PSY (모돈당 연간 이유두수)</h4>
                    <p className="text-[11px] font-bold text-slate-600 mb-2">최근 1년 총 이유두수 ÷ 연평균 상시 모돈수</p>
                    <div className="bg-white p-2 rounded-lg text-center font-black text-slate-800 text-sm shadow-sm">
                      {(dashboardStats || {}).manualYearlyWeaned || 0}두 ÷ {(dashboardStats || {}).avgSows || 0}두 = <span className="text-indigo-600">{(dashboardStats || {}).psy || '0.0'}</span>
                    </div>
                    <p className="text-[9px] text-slate-500 mt-2">* 수기 기록된 최근 365일간의 이유 성적 합산 기준</p>
                  </div>

                  <div className="bg-violet-50 p-4 rounded-xl border border-violet-100">
                    <h4 className="text-xs font-black text-violet-600 mb-2">예상 MSY (모돈당 연간 출하두수)</h4>
                    <p className="text-[11px] font-bold text-slate-600 mb-2">PSY × 예상 육성률 (95%)</p>
                    <div className="bg-white p-2 rounded-lg text-center font-black text-slate-800 text-sm shadow-sm">
                      {(dashboardStats || {}).psy || '0.0'} × 0.95 = <span className="text-violet-600">{(dashboardStats || {}).msy || '0.0'}</span>
                    </div>
                  </div>
                </div>
                
                <button onClick={() => setShowFormulaModal(false)} className="w-full mt-6 py-4 bg-slate-800 text-white rounded-2xl font-black shadow-lg hover:bg-slate-700 active:scale-95 transition-all">닫기</button>
              </div>
            </div>
          )}

          {/* 새 모돈 등록 플로팅 버튼 */}
          <button 
            onClick={() => { setShowSowListModal(false); setShowAddSow(true); }}
            className="fixed bottom-6 right-6 bg-slate-800 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-transform z-[60]"
          >
            <Plus className="w-6 h-6" />
          </button>

          {/* 새 모돈 등록 모달 */}
          {showAddSow && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-end md:items-center justify-center">
              <div className="bg-white rounded-t-[2rem] md:rounded-[2rem] w-full max-w-sm p-6 shadow-2xl" style={{ animation: "slideUp 0.2s ease-out" }}>
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-800">새 모돈 등록</h3>
                  <button onClick={() => setShowAddSow(false)} className="p-2 bg-slate-100 rounded-full text-slate-500"><X className="w-5 h-5" /></button>
                </div>
                <form onSubmit={handleAddSow} className="space-y-4">
                  <div>
                    <label className="text-[11px] font-bold text-slate-500 block mb-1">개체 관리 번호</label>
                    <input 
                      type="text" 
                      required 
                      value={(newSow || {}).sowNo || ''} 
                      onChange={e => setNewSow({...newSow, sowNo: e.target.value})} 
                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-black outline-none focus:border-blue-400" 
                      placeholder="예: 23-11" 
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-[11px] font-bold text-slate-500 block mb-1">현재 산차</label>
                      <input 
                        type="number" 
                        value={(newSow || {}).parity || ''} 
                        onChange={e => setNewSow({...newSow, parity: e.target.value})} 
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-black outline-none focus:border-blue-400" 
                      />
                    </div>
                    <div>
                      <label className="text-[11px] font-bold text-slate-500 block mb-1">초기 상태</label>
                      <select 
                        value={(newSow || {}).currentStatus || '이유'} 
                        onChange={e => setNewSow({...newSow, currentStatus: e.target.value})} 
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-black outline-none focus:border-blue-400"
                      >
                        <option value="이유">이유</option>
                        <option value="임신">임신</option>
                        <option value="포유">포유</option>
                        <option value="재발">재발</option>
                      </select>
                    </div>
                  </div>
                  <button type="submit" className="w-full mt-4 py-4 bg-slate-800 text-white rounded-2xl font-black shadow-lg">등록하기</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
