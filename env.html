<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성암농장 실시간 모니터링</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
  <style>
    .readonly-cell { background-color: #f9fafb; transition: all 0.3s; }
    .status-badge { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
  <div class="max-w-5xl mx-auto">
    <header class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">🏠 성암농장 모니터링</h1>
        <p class="text-gray-500">파이어베이스 창고 실시간 연결 (B 연구용)</p>
      </div>
      <div id="system-status" class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-semibold text-sm status-badge">
        🔵 창고 감시 중...
      </div>
    </header>

    <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-green-600 text-white text-sm">
            <th class="p-4">돈사 구역</th>
            <th class="p-4 text-center">온도 🌡️</th>
            <th class="p-4 text-center">습도 💧</th>
            <th class="p-4 text-center">최근 수신 시간</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200" id="sensor-table"></tbody>
      </table>
    </div>
  </div>

  <script>
    // 1. 파이어베이스 창고 설정 (사장님 주소)
    const firebaseConfig = {
      databaseURL: "https://sungamfarm-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const sensorNames = [
      '이유_1배치', '이유_2배치', '이유_3배치', '이유_4배치', '이유_5배치',
      '육성_1배치', '육성_2배치', '육성_3배치', '육성_4배치', '육성_5배치', '육성_6배치', '외부온도'
    ];

    const tableBody = document.getElementById('sensor-table');
    
    // 테이블 미리 그리기
    sensorNames.forEach(name => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="p-4 font-bold text-gray-700">${name}</td>
        <td class="p-4 text-center readonly-cell border-l">
            <span id="${name}-temp" class="text-2xl font-bold text-red-500">--</span> °C
        </td>
        <td class="p-4 text-center readonly-cell border-l">
            <span id="${name}-humi" class="text-xl font-bold text-blue-500">--</span> %
        </td>
        <td class="p-4 text-center text-sm text-gray-400 readonly-cell border-l" id="${name}-time">대기 중...</td>
      `;
      tableBody.appendChild(row);
    });

    // 2. 창고 감시 함수 (핵심!)
    function startMonitoring() {
      const statusBadge = document.getElementById('system-status');
      const sensorRef = database.ref('sensor_logs'); // sensor_logs 서랍 감시

      sensorRef.on('value', (snapshot) => {
        const data = snapshot.val();
        
        if (data) {
          statusBadge.innerHTML = '🟢 실시간 데이터 연결됨';
          statusBadge.className = 'bg-green-100 text-green-800 px-4 py-2 rounded-full font-semibold text-sm status-badge';

          // 창고에 들어있는 데이터들을 화면에 뿌려줌
          Object.keys(data).forEach(name => {
            const tempEl = document.getElementById(`${name}-temp`);
            const humiEl = document.getElementById(`${name}-humi`);
            const timeEl = document.getElementById(`${name}-time`);

            if (tempEl) tempEl.innerText = data[name].temp;
            if (humiEl) humiEl.innerText = data[name].humi;
            if (timeEl) {
              timeEl.innerText = data[name].timestamp || new Date().toLocaleTimeString();
              timeEl.className = "p-4 text-center text-sm text-green-600 font-medium readonly-cell border-l";
            }
          });
        } else {
          statusBadge.innerHTML = '🟡 창고 데이터 비어있음';
          statusBadge.className = 'bg-yellow-100 text-yellow-800 px-4 py-2 rounded-full font-semibold text-sm';
        }
      }, (error) => {
        console.error(error);
        statusBadge.innerHTML = '🔴 창고 연결 실패';
        statusBadge.className = 'bg-red-100 text-red-800 px-4 py-2 rounded-full font-semibold text-sm';
      });
    }

    // 모니터링 시작
    startMonitoring();
  </script>
</body>
</html>
