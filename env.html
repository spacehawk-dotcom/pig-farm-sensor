<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성암농장 실시간 모니터링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">🐖 성암농장 실시간 환경 모니터링</h1>
            <div id="empty-warning" class="bg-yellow-100 text-yellow-700 px-4 py-2 rounded-lg text-sm font-medium">
                데이터를 불러오는 중입니다...
            </div>
        </header>

        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://sungamfarm-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const sensorRef = db.ref('sensor_logs');
        const cardContainer = document.getElementById('card-container');

        sensorRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // 데이터가 들어오면 '불러오는 중...' 노란색 경고창 숨기기
                const warning = document.getElementById('empty-warning');
                if (warning) warning.style.display = 'none';

                // 기존 카드를 싹 지우고 최신 상태로 다시 그립니다 (중복 방지)
                cardContainer.innerHTML = '';

                // 창고에 있는 구역 이름(이유_1배치, 육성_1배치 등)을 하나씩 꺼내서 카드를 만듭니다
                Object.keys(data).forEach(zoneName => {
                    const zone = data[zoneName];
                    
                    // 에러(연결실패) 처리용 변수
                    const timeStr = zone.timestamp || '시간 정보 없음';
                    const timeColor = (timeStr === "연결실패") ? "text-red-500 font-bold" : "text-gray-400 italic";
                    const tempVal = zone.temp !== undefined ? zone.temp : '--';
                    const humiVal = zone.humi !== undefined ? zone.humi : '--';

                    // 🌟 카드 자동 생성 HTML 모양
                    const cardHTML = `
                        <div class="card">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-bold text-gray-700">${zoneName}</h2>
                                <span class="text-xs ${timeColor}">${timeStr}</span>
                            </div>
                            <div class="flex justify-around items-center">
                                <div class="text-center">
                                    <p class="text-sm text-gray-500 mb-1">온도 🌡️</p>
                                    <p class="text-4xl font-black text-blue-600">${tempVal}</p>
                                    <span class="text-gray-400 text-sm">°C</span>
                                </div>
                                <div class="text-center">
                                    <p class="text-sm text-gray-500 mb-1">습도 💧</p>
                                    <p class="text-4xl font-black text-green-500">${humiVal}</p>
                                    <span class="text-gray-400 text-sm">%</span>
                                </div>
                            </div>
                        </div>
                    `;
                    // 만들어진 카드를 화면(card-container)에 쏙 집어넣습니다
                    cardContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
            }
        });
    </script>
</body>
</html>
