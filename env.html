<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성암농장 실시간 모니터링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #10b981; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">🐖 성암농장 실시간 환경 모니터링</h1>
            <div id="empty-warning" class="bg-yellow-100 text-yellow-700 px-4 py-2 rounded-lg text-sm font-medium">
                데이터를 불러오는 중입니다...
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-700">이유_1배치</h2>
                    <span id="이유_1배치_time" class="text-xs text-gray-400 italic">대기 중...</span>
                </div>
                <div class="flex justify-around items-center">
                    <div class="text-center">
                        <p class="text-sm text-gray-500 mb-1">온도 🌡️</p>
                        <p id="이유_1배치_temp" class="text-4xl font-black text-blue-600">--</p>
                        <span class="text-gray-400 text-sm">°C</span>
                    </div>
                    <div class="text-center">
                        <p class="text-sm text-gray-500 mb-1">습도 💧</p>
                        <p id="이유_1배치_humi" class="text-4xl font-black text-green-500">--</p>
                        <span class="text-gray-400 text-sm">%</span>
                    </div>
                </div>
            </div>

            <div id="dynamic-zones" class="contents">
                </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://sungamfarm-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const sensorRef = db.ref('sensor_logs');

        sensorRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const warning = document.getElementById('empty-warning');
                if (warning) warning.style.display = 'none';

                Object.keys(data).forEach(zoneName => {
                    const zone = data[zoneName];
                    const tempEl = document.getElementById(`${zoneName}_temp`);
                    const humiEl = document.getElementById(`${zoneName}_humi`);
                    const timeEl = document.getElementById(`${zoneName}_time`);

                    if (tempEl) tempEl.innerText = zone.temp !== undefined ? zone.temp : '--';
                    if (humiEl) humiEl.innerText = zone.humi !== undefined ? zone.humi : '--';
                    
                    if (timeEl) {
                        const timeStr = zone.timestamp || '시간 정보 없음';
                        timeEl.innerText = timeStr;
                        timeEl.style.color = (timeStr === "연결실패") ? "red" : "#888";
                    }
                });
            }
        });
    </script>
</body>
</html>
