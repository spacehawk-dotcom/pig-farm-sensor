<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성암농장 실시간 모니터링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">🐖 성암농장 실시간 환경 모니터링</h1>
            <div id="status-indicator" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-300">
                대기 중...
            </div>
        </header>

        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="history-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[80vh] flex flex-col overflow-hidden">
            <div class="bg-green-600 p-4 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold">과거 기록</h3>
                <button onclick="closeModal()" class="text-white hover:text-gray-200 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div class="p-0 overflow-y-auto flex-1 bg-gray-50">
                <table class="w-full text-center text-sm">
                    <thead class="bg-gray-100 text-gray-600 sticky top-0 border-b shadow-sm">
                        <tr>
                            <th class="py-3 font-semibold">측정 시간</th>
                            <th class="py-3 font-semibold">온도 🌡️</th>
                            <th class="py-3 font-semibold">습도 💧</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body" class="divide-y divide-gray-200 bg-white"></tbody>
                </table>
            </div>
            <div class="p-3 text-center border-t text-xs text-gray-500 bg-white">최근 50개의 누적 기록만 표시됩니다.</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <script>
        // 사장님 앱의 진짜 열쇠를 사용해 권한 완벽 통과!
        const firebaseConfig = {
            apiKey: "AIzaSyBlptGu2gTAQKVy_yDomKkNEd_el6c1PL0",
            authDomain: "sungamfarm.firebaseapp.com",
            projectId: "sungamfarm",
            databaseURL: "https://sungamfarm-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const rtdb = firebase.database();
        const firestore = firebase.firestore();
        const auth = firebase.auth();

        const cardContainer = document.getElementById('card-container');
        const statusIndicator = document.getElementById('status-indicator');

        let sensorData = {}; // 투야 온도 저장소
        let farmData = {};   // 사육현황 앱 데이터 저장소

        // 🌟 1. 투야 센서 데이터 수신 (기존과 동일)
        rtdb.ref('sensor_logs').on('value', (snapshot) => {
            sensorData = snapshot.val() || {};
            renderCards();
        });

        // 🌟 2. 사육현황 앱 데이터 실시간 수신 (사장님 앱과 완벽 연동!)
        auth.signInAnonymously().then(() => {
            firestore.collection('farms/sungamfarm/weaning').onSnapshot(snap => {
                snap.forEach(doc => { farmData['이유_' + doc.id.split('_')[1] + '배치'] = extractFarmInfo(doc.data()); });
                renderCards();
            });
            firestore.collection('farms/sungamfarm/grower').onSnapshot(snap => {
                snap.forEach(doc => { farmData['육성_' + doc.id.split('_')[1] + '배치'] = extractFarmInfo(doc.data()); });
                renderCards();
            });
        }).catch(err => console.error("권한 에러:", err));

        // 🌟 3. 사장님이 만드신 '목표 온도' 계산 로직 적용 완료!
        function extractFarmInfo(data) {
            let count = data.pigs || 0;
            let allDates = [];
            if (data.penDates) allDates = data.penDates.filter(d => d.trim() !== '');
            if (allDates.length === 0) {
                if (data.date) allDates.push(data.date);
                if (data.weaningDate) allDates.push(data.weaningDate);
            }

            let dateRange = "-- ~ --";
            let targetTempHtml = "";

            if (allDates.length > 0) {
                allDates.sort();
                const startStr = allDates[0]; // 2024-04-10 형태로 나옴
                const endStr = allDates[allDates.length - 1];

                const startDisp = startStr.substring(5).replace('-', '.');
                const endDisp = endStr.substring(5).replace('-', '.');
                dateRange = startDisp === endDisp ? startDisp : `${startDisp} ~ ${endDisp}`;

                // 사장님 수식 완벽 적용
                const startDate = new Date(startStr);
                startDate.setHours(0,0,0,0);
                const today = new Date();
                today.setHours(0,0,0,0);
                const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
                const currentAge = diffDays + 20;

                let targetTemp = 30.0 - ((currentAge - 20) * 0.15);
                targetTemp = Math.max(18.0, Math.min(30.0, targetTemp));

                targetTempHtml = `<span class="bg-orange-50 text-orange-600 text-[11px] px-2 py-1 rounded-lg border border-orange-100 font-black ml-2 shadow-sm">권장 ${targetTemp.toFixed(1)}°C</span>`;
            }

            return { count, dateRange, targetTempHtml };
        }

        // 🌟 4. 카드 화면 그리기 (데이터 합체)
        function renderCards() {
            if (Object.keys(sensorData).length === 0) return;
            
            cardContainer.innerHTML = '';
            const sortedKeys = Object.keys(sensorData).sort((a,b) => a.localeCompare(b));

            sortedKeys.forEach(zoneName => {
                const zone = sensorData[zoneName];
                const fData = farmData[zoneName] || { count: 0, dateRange: '--', targetTempHtml: '' };
                
                let timeColor = "text-gray-400 italic";
                let tempVal = zone.temp !== undefined ? zone.temp : '--';
                let humiVal = zone.humi !== undefined ? zone.humi : '--';
                const timeStr = zone.timestamp || '정보 없음';

                if (timeStr.includes('수면') || timeStr.includes('실패') || timeStr.includes('support')) {
                    timeColor = "text-red-500 font-bold text-xs";
                } else {
                    timeColor = "text-gray-400 text-xs";
                }

                const cardHTML = `
                    <div class="card cursor-pointer hover:bg-green-50 transition-all duration-300 transform hover:-translate-y-1 border border-transparent hover:border-green-200" onclick="openHistory('${zoneName}')">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <div class="flex items-center">
                                    <h2 class="text-xl font-bold text-gray-800">${zoneName}</h2>
                                    ${fData.targetTempHtml}
                                </div>
                                <div class="flex gap-2 mt-1">
                                    <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-0.5 rounded-full font-bold">🐖 ${fData.count}두</span>
                                    <span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded-full font-medium">📅 ${fData.dateRange}</span>
                                </div>
                            </div>
                            <span class="${timeColor} text-right">${timeStr}</span>
                        </div>
                        
                        <div class="flex justify-around items-center mt-4">
                            <div class="text-center">
                                <p class="text-xs text-gray-400 mb-1 font-medium text-center">현재 온도</p>
                                <p class="text-4xl font-black text-blue-600">${tempVal}<span class="text-lg ml-0.5">°C</span></p>
                            </div>
                            <div class="text-center border-l pl-6">
                                <p class="text-xs text-gray-400 mb-1 font-medium text-center">현재 습도</p>
                                <p class="text-4xl font-black text-green-500">${humiVal}<span class="text-lg ml-0.5">%</span></p>
                            </div>
                        </div>
                    </div>
                `;
                cardContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function openHistory(zoneName) {
            document.getElementById('modal-title').innerText = `📊 ${zoneName} 누적 기록`;
            document.getElementById('history-modal').classList.remove('hidden');
            const tbody = document.getElementById('history-table-body');
            tbody.innerHTML = '<tr><td colspan="3" class="py-8 text-gray-500 font-medium">기록을 불러오는 중입니다... ⏳</td></tr>';

            rtdb.ref('history_logs').orderByKey().limitToLast(50).once('value').then(snapshot => {
                const logs = snapshot.val();
                tbody.innerHTML = '';
                if (logs) {
                    const sortedKeys = Object.keys(logs).sort((a, b) => b - a);
                    let html = '';
                    sortedKeys.forEach(key => {
                        const zoneData = logs[key][zoneName];
                        if (zoneData) {
                            const isError = zoneData.temp === "--";
                            html += `
                                <tr class="hover:bg-gray-50 transition-colors border-b">
                                    <td class="py-3 text-xs text-gray-500">${zoneData.timestamp}</td>
                                    <td class="py-3 text-sm ${isError ? 'text-gray-400' : 'text-blue-600 font-bold'}">${zoneData.temp}${isError ? '' : '°C'}</td>
                                    <td class="py-3 text-sm ${isError ? 'text-gray-400' : 'text-green-500 font-bold'}">${zoneData.humi}${isError ? '' : '%'}</td>
                                </tr>
                            `;
                        }
                    });
                    tbody.innerHTML = html || '<tr><td colspan="3" class="py-8 text-gray-500">기록이 없습니다.</td></tr>';
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" class="py-8 text-gray-500">저장된 기록이 없습니다.</td></tr>';
                }
            });
        }

        function closeModal() { document.getElementById('history-modal').classList.add('hidden'); }

        function refreshData() {
            statusIndicator.innerText = "데이터 갱신 중... 🔄";
            statusIndicator.className = "bg-yellow-100 text-yellow-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-300";
            fetch('https://sungamfarm.netlify.app/.netlify/functions/app')
                .then(response => {
                    statusIndicator.innerText = "최신 업데이트 완료 🟢";
                    statusIndicator.className = "bg-green-100 text-green-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-300";
                    setTimeout(() => {
                        statusIndicator.innerText = "실시간 감시 중 🔵";
                        statusIndicator.className = "bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-300";
                    }, 3000);
                })
                .catch(error => {
                    statusIndicator.innerText = "갱신 실패 🔴";
                    statusIndicator.className = "bg-red-100 text-red-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-300";
                });
        }

        refreshData();
        setInterval(refreshData, 300000);
    </script>
</body>
</html>
