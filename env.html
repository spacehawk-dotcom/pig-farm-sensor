<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성암농장 실시간 모니터링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">🐖 성암농장 실시간 환경 모니터링</h1>
            <div id="status-indicator" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium">
                대기 중...
            </div>
        </header>

        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://sungamfarm-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const sensorRef = db.ref('sensor_logs');
        const cardContainer = document.getElementById('card-container');
        const statusIndicator = document.getElementById('status-indicator');

        // 파이어베이스에서 데이터가 오면 화면에 그리기
        sensorRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                cardContainer.innerHTML = '';
                Object.keys(data).forEach(zoneName => {
                    const zone = data[zoneName];
                    
                    let timeColor = "text-gray-400 italic";
                    let tempVal = zone.temp !== undefined ? zone.temp : '--';
                    let humiVal = zone.humi !== undefined ? zone.humi : '--';
                    const timeStr = zone.timestamp || '시간 정보 없음';

                    if (timeStr.includes('수면모드') || timeStr.includes('실패') || timeStr.includes('support')) {
                        timeColor = "text-red-500 font-bold text-xs";
                    } else {
                        timeColor = "text-gray-400 text-xs";
                    }

                    const cardHTML = `
                        <div class="card">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-xl font-bold text-gray-700">${zoneName}</h2>
                                <span class="${timeColor}">${timeStr}</span>
                            </div>
                            <div class="flex justify-around items-center">
                                <div class="text-center">
                                    <p class="text-sm text-gray-500 mb-1">온도 🌡️</p>
                                    <p class="text-4xl font-black text-blue-600">${tempVal}</p>
                                    <span class="text-gray-400 text-sm">°C</span>
                                </div>
                                <div class="text-center">
                                    <p class="text-sm text-gray-500 mb-1">습도 💧</p>
                                    <p class="text-4xl font-black text-green-500">${humiVal}</p>
                                    <span class="text-gray-400 text-sm">%</span>
                                </div>
                            </div>
                        </div>
                    `;
                    cardContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
            }
        });

        // 🌟 [핵심 기능] 배달원을 몰래 호출하는 '자동 갱신 타이머'
        function refreshData() {
            statusIndicator.innerText = "데이터 갱신 중... 🔄";
            statusIndicator.className = "bg-yellow-100 text-yellow-700 px-4 py-2 rounded-lg text-sm font-medium";
            
            // 화면 뒤에서 몰래 엔진 주소로 접속해서 배달원 출발시킴
            fetch('https://sungamfarm.netlify.app/.netlify/functions/app')
                .then(response => {
                    statusIndicator.innerText = "최신 업데이트 완료 🟢";
                    statusIndicator.className = "bg-green-100 text-green-700 px-4 py-2 rounded-lg text-sm font-medium";
                    // 3초 뒤에 원래 파란색 불빛으로 복구
                    setTimeout(() => {
                        statusIndicator.innerText = "실시간 감시 중 🔵";
                        statusIndicator.className = "bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium";
                    }, 3000);
                })
                .catch(error => {
                    statusIndicator.innerText = "갱신 실패 🔴";
                    statusIndicator.className = "bg-red-100 text-red-700 px-4 py-2 rounded-lg text-sm font-medium";
                });
        }

        // 1. 스마트폰으로 이 웹페이지를 딱 열었을 때 바로 한 번 갱신!
        refreshData();

        // 2. 창을 계속 켜두면 5분(300,000 밀리초)마다 자동으로 한 번씩 갱신!
        setInterval(refreshData, 300000);
    </script>
</body>
</html>
