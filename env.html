<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성암농장 실시간 모니터링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* CSS에서 배경색(white) 속성을 빼고 테일윈드로 동적 제어하도록 수정했습니다 */
        .card { border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">🐖 성암농장 실시간 환경 모니터링</h1>
            <div id="status-indicator" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors duration-300">
                대기 중...
            </div>
        </header>

        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="history-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-green-600 p-4 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold">과거 기록 분석</h3>
                <button onclick="closeModal()" class="text-white hover:text-gray-200 text-2xl font-bold leading-none">&times;</button>
            </div>
            
            <div class="bg-gray-50 p-3 border-b flex flex-wrap gap-2 items-center justify-between">
                <div class="flex items-center gap-2">
                    <input type="datetime-local" id="history-start" class="border border-gray-300 p-1.5 rounded text-sm text-gray-700 outline-none focus:border-green-500">
                    <span class="text-gray-500 font-bold">~</span>
                    <input type="datetime-local" id="history-end" class="border border-gray-300 p-1.5 rounded text-sm text-gray-700 outline-none focus:border-green-500">
                    <button onclick="fetchHistoryData()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1.5 rounded shadow-sm text-sm font-bold transition-colors">조회</button>
                </div>
                <button onclick="downloadExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded shadow-sm text-sm font-bold flex items-center gap-1 transition-colors">
                    ⬇️ 엑셀 다운로드
                </button>
            </div>

            <div class="flex-1 overflow-y-auto flex flex-col p-4 bg-white">
                <div class="w-full h-64 mb-6 border-b pb-4">
                    <canvas id="historyChart"></canvas>
                </div>
                <table class="w-full text-center text-sm">
                    <thead class="bg-gray-100 text-gray-600 sticky top-0">
                        <tr>
                            <th class="py-2 font-semibold border-b">측정 시간</th>
                            <th class="py-2 font-semibold border-b">온도 🌡️</th>
                            <th class="py-2 font-semibold border-b">습도 💧</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body" class="divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://sungamfarm-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.database();
        const sensorRef = db.ref('sensor_logs');
        const cardContainer = document.getElementById('card-container');
        const statusIndicator = document.getElementById('status-indicator');

        let currentZone = '';
        let myChart = null;
        let chartDataForExcel = [];

        // 1. 실시간 메인 카드 그리기
        sensorRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                cardContainer.innerHTML = '';
                Object.keys(data).forEach(zoneName => {
                    const zone = data[zoneName];
                    let timeColor = "text-gray-400 italic";
                    let tempVal = zone.temp !== undefined ? zone.temp : '--';
                    let humiVal = zone.humi !== undefined ? zone.humi : '--';
                    const timeStr = zone.timestamp || '정보 없음';
                    const pigCount = zone.count || '0';
                    const dateRange = zone.dateRange || '-- ~ --';

                    // 일령 및 기준 온도 계산
                    let targetTempHtml = '';
                    let targetTemp = null; // 온도 계산용 변수

                    if (dateRange && dateRange !== '-- ~ --' && dateRange !== '--') {
                        try {
                            const startStr = dateRange.split('~')[0].trim(); 
                            const [mm, dd] = startStr.split('.');
                            const currentYear = new Date().getFullYear();
                            const startDate = new Date(currentYear, parseInt(mm) - 1, parseInt(dd));
                            
                            const diffDays = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
                            const currentAge = diffDays + 20; 

                            targetTemp = 30.0 - ((currentAge - 20) * 0.15);
                            targetTemp = Math.max(18.0, Math.min(30.0, targetTemp));

                            targetTempHtml = `<span class="bg-orange-50 text-orange-600 text-[11px] px-2 py-1 rounded-lg border border-orange-100 font-black
